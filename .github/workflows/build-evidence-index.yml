name: Build evidence index

on:
  schedule:
    # 05:17 UTC daily — quiet hour for the parliament API.
    - cron: '17 5 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build evidence-index.json
        run: python3 tools/build-evidence-index.py

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add evidence-index.json
          if git diff --cached --quiet; then
            echo 'No changes to evidence-index.json'
          else
            git commit -m 'Rebuild evidence-index.json'
            git push
          fi
