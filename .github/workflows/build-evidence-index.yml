name: Build evidence index

on:
  schedule:
    # 05:17 UTC daily — quiet hour for the parliament API.
    - cron: '17 5 * * *'
  workflow_dispatch:
    inputs:
      quarter:
        description: 'Build a quarterly archive (e.g. 2025-Q4). Leave blank for the rolling 90-day index.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build the index
        run: |
          if [ -n "${{ inputs.quarter }}" ]; then
            python3 tools/build-evidence-index.py --quarter "${{ inputs.quarter }}"
          else
            python3 tools/build-evidence-index.py
          fi

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add evidence-index.json evidence-*-Q*.json evidence-archives.json
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            if [ -n "${{ inputs.quarter }}" ]; then
              git commit -m "Build quarterly archive ${{ inputs.quarter }}"
            else
              git commit -m 'Rebuild rolling evidence index'
            fi
            git push
          fi
